    document.getElementById('btn_nav_only').addEventListener('click', () => {
      setLegendSelected(navOnlySelected());
    });
    document.getElementById('toggle_signal').addEventListener('change', (ev) => {
      const selected = chart.getOption().legend[0].selected || {};
      selected["看多信号阴影"] = ev.target.checked;
      setLegendSelected(selected);
    });
  </script>
</body>
</html>
